services:
  calendar-fetcher:
    build: ./calendar-fetcher
    restart: unless-stopped
    environment:
      - CALENDAR_ID=${CALENDAR_ID}
      - OUTPUT_DIR=/output
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-1800}
      - TZ=${TZ:-Europe/London}
      - LATITUDE=${LATITUDE}
      - LONGITUDE=${LONGITUDE}
    volumes:
      - ./credentials:/credentials:ro
      - output:/output

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - output:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - calendar-fetcher

volumes:
  output:
